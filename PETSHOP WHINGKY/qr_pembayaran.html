<!DOCTYPE html>
<html lang='id'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Bayar via QRIS - Toko Whingky</title>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'></script>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link href='https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap' rel='stylesheet'>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Mono', monospace;
      background: #0d0d14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(250,204,21,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      background: #13131f;
      border: 1px solid #2a2a3d;
      border-radius: 20px;
      padding: 36px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 60px rgba(250,204,21,0.04), 0 24px 64px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #facc15, transparent);
      border-radius: 2px;
    }
    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 0.12em;
      color: #facc15;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 10px;
      color: #4a4a6a;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .divider {
      border: none;
      border-top: 1px solid #1e1e30;
      margin: 20px 0;
    }
    .label {
      font-size: 10px;
      color: #4a4a6a;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .buyer {
      font-size: 16px;
      color: #c0c0e0;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .total-amount {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      line-height: 1;
    }
    .total-amount span { color: #facc15; }
    .qr-wrapper {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 20px;
      box-shadow: 0 0 0 1px rgba(250,204,21,0.15), 0 8px 32px rgba(0,0,0,0.4);
    }
    #qrcode { display: block; }
    #qrcode img, #qrcode canvas { display: block; }
    .qris-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #facc15;
      color: #0d0d14;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .instruction {
      font-size: 12px;
      color: #5a5a7a;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .timestamp {
      font-size: 10px;
      color: #2e2e46;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
<body>
  <div class='card'>
    <div class='brand'>&#128062; WHINGKY</div>
    <div class='tagline'>Toko Perlengkapan Hewan</div>
    <hr class='divider'>
    <div class='label'>Pembeli</div>
    <div class='buyer'>Denny</div>
    <div class='label'>Total Pembayaran</div>
    <div class='total-amount'><span>Rp</span> 70000</div>
    <div class='qris-badge'>&#9646;&#9646; QRIS</div>
    <div class='qr-wrapper'>
      <div id='qrcode'></div>
    </div>
    <p class='instruction'>
      Buka aplikasi e-wallet atau m-banking kamu,<br>
      lalu scan QR di atas untuk menyelesaikan pembayaran.
    </p>
    <hr class='divider'>
    <div class='timestamp'>11-05-2026 15:44:02</div>
  </div>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'WHINGKY-QRIS|PEMBELI:Denny|TOTAL:Rp70000|WAKTU:11-05-2026 15:44:02|MERCHANT:TokoWhingky',
      width:  220,
      height: 220,
      colorDark:  '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
